name: Deploy Docs

# Publishes the hand-written static site in pages/ to GitHub Pages.
# Requires repo Settings -> Pages -> Source = "GitHub Actions".
# Only pages/** changes trigger a deploy; source-only commits do not.
on:
  push:
    branches: [main]
    paths:
      - "pages/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

run-name: Deploy Docs · ${{ github.ref_name }}

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once, and never cancel one midway:
# a half-applied deploy would leave the live site in a mixed state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
