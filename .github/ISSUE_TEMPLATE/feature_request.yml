name: Feature request
description: Suggest a capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the problem you're trying to solve, not only the API you'd like.
        Understanding the underlying need often leads to a better design.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: What are you building, and where does deepcrew-ai currently get in the way?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the API or behaviour look like?
      render: python

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other designs you weighed.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agent / runner loop
        - Orchestrator / APEX
        - Self-improving loop (verifier, skills, procedural memory)
        - Agent spawning
        - Memory providers
        - Streaming / StreamPolicy
        - FastAPI integration
        - MCP
        - CLI
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR for this
