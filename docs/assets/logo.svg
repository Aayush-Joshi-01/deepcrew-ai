<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="g"><feGaussianBlur stdDeviation="1.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gs"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="nL" cx="40%" cy="30%" r="65%"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#aaa"/></radialGradient>
    <radialGradient id="nS" cx="40%" cy="30%" r="65%"><stop offset="0%" stop-color="#ccc"/><stop offset="100%" stop-color="#666"/></radialGradient>
  </defs>
  <!-- lines -->
  <line x1="22" y1="10" x2="9" y2="34" stroke="rgba(255,255,255,0.22)" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="22" y1="10" x2="35" y2="34" stroke="rgba(255,255,255,0.22)" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="9" y1="34" x2="35" y2="34" stroke="rgba(255,255,255,0.10)" stroke-width="0.8" stroke-dasharray="2.5 2.5" stroke-linecap="round"/>
  <!-- orbit ring -->
  <circle cx="22" cy="10" r="7.5" stroke="rgba(255,255,255,0.09)" stroke-width="0.8"/>
  <!-- animated dots -->
  <circle r="1.4" fill="white" opacity="0.8"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#pl"/></animateMotion></circle>
  <path id="pl" d="M22,10 L9,34"/>
  <circle r="1.4" fill="white" opacity="0.8"><animateMotion dur="2s" begin="1s" repeatCount="indefinite"><mpath href="#pr"/></animateMotion></circle>
  <path id="pr" d="M22,10 L35,34"/>
  <!-- nodes -->
  <circle cx="22" cy="10" r="4.5" fill="url(#nL)" filter="url(#g)"/>
  <circle cx="22" cy="9"  r="1.6" fill="rgba(255,255,255,0.45)"/>
  <circle cx="9"  cy="34" r="3.2" fill="url(#nS)" filter="url(#gs)"/>
  <circle cx="9"  cy="33.4" r="1.1" fill="rgba(255,255,255,0.38)"/>
  <circle cx="35" cy="34" r="3.2" fill="url(#nS)" filter="url(#gs)"/>
  <circle cx="35" cy="33.4" r="1.1" fill="rgba(255,255,255,0.38)"/>
</svg>
